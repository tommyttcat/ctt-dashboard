name: Market Scanner Automator

on:
  schedule:
    # Runs every 5 minutes, Monday through Friday
    - cron: '*/5 * * * 1-5'
  workflow_dispatch: # Allows you to manually click "Run workflow"

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Scanner Route
        run: |
          response=$(curl -s -w "%{http_code}" -X GET "https://ctt-dashboard.vercel.app/api/scanner/run" -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          
          # Extract the HTTP status code from the end of the response
          http_code=$(echo "$response" | tail -c 4)
          
          if [ "$http_code" -eq 200 ]; then
            echo "Scanner ran successfully!"
          else
            echo "Error: Scanner failed with status $http_code"
            echo "Full response: $response"
            exit 1
          fi