name: Market Scanner Automator

on:
  schedule:
    # 1. Runs every 10 minutes from 4:00 AM Eastern to 7:50 PM Eastern (Monday - Friday)
    # Covers UTC hours 08:00 to 23:50
    - cron: '*/10 8-23 * * 1-5'
    
    # 2. Runs every 10 minutes from 8:00 PM Eastern to 8:50 PM Eastern (Monday - Friday Eastern)
    # Maps to Tuesday - Saturday 00:00 to 00:50 UTC due to the midnight crossover
    - cron: '*/10 0 * * 2-6'
    
  workflow_dispatch: # Allows manual executions via the "Run workflow" button

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Scanner Route
        run: |
          response=$(curl -s -w "%{http_code}" -X GET "https://ctt-dashboard.vercel.app/api/scanner/run" -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          
          # Extract the HTTP status code from the end of the response
          http_code=$(echo "$response" | tail -c 4)
          
          if [ "$http_code" -eq 200 ]; then
            echo "Scanner ran successfully!"
          else
            echo "Error: Scanner failed with status $http_code"
            echo "Full response: $response"
            exit 1
          fi